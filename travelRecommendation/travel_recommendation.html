  <title>Travel Bloom header</title>
  <link rel="stylesheet" href="./TravelBloom.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url("background.gif");
      background-repeat: no-repeat;
      background-size: cover;        /* Ensures full coverage */
      background-position: center;   /* Centers the image */
      background-attachment: fixed;  /* Optional: keeps image fixed while scrolling */
    }
    h1 {
      color: white;
      text-align: center;
      /*margin-top: 40vh;*/
      font-family: Arial, sans-serif;
      text-shadow: 0 0 10px black;
    }
    p {
      color: white;
      text-align: center;
    }
    .social-bar {
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 1000;
    }
    .social-bar a {
      font-size: 28px;
      color: white;
      background: #333;
      width: 45px;
      height: 45px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      text-decoration: none;
      transition: 0.3s;
    }
    .social-bar a:hover {
      background: #555;
      transform: scale(1.1);
    }
    .rowDiv {
      display: flex; /* Place les enfants en ligne */
    }
    .columnDiv {
      flex: 1; /* Chaque colonne prend une part égale */
      padding: 10px;
      /*border: 1px solid #ccc;
      box-sizing: border-box;*/
    }
  </style>
</head>
